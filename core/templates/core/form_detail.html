{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ form.title }}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: #f7f5f2;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .form-card {
      background: #fff;
      border: 1px solid #e0dbd4;
      border-radius: 4px;
      padding: 2.5rem;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.06);
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 2rem;
      letter-spacing: -0.02em;
    }

    .question-block {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 0.9rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 0.4rem;
    }

    label .required-star {
      color: #c0392b;
      margin-left: 2px;
    }

    input[type="text"],
    input[type="email"],
    input[type="number"],
    textarea {
      width: 100%;
      padding: 0.6rem 0.8rem;
      border: 1.5px solid #ccc;
      border-radius: 3px;
      font-size: 1rem;
      font-family: inherit;
      color: #1a1a1a;
      background: #fafafa;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    input:focus, textarea:focus {
      border-color: #555;
      box-shadow: 0 0 0 3px rgba(0,0,0,0.06);
      background: #fff;
    }

    input.field-error, textarea.field-error {
      border-color: #c0392b;
      background: #fff8f7;
    }

    .error-message {
      display: none;
      color: #c0392b;
      font-size: 0.8rem;
      margin-top: 0.35rem;
      font-weight: 500;
    }

    .error-message.visible {
      display: block;
    }

    textarea { resize: vertical; min-height: 80px; }

    .submit-btn {
      margin-top: 0.5rem;
      padding: 0.75rem 2rem;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 3px;
      font-size: 1rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      letter-spacing: 0.01em;
    }

    .submit-btn:hover { background: #333; }
  </style>
</head>
<body>
  <div class="form-card">
    <h1>{{ form.title }}</h1>

    <form method="post" novalidate id="main-form">
      {% csrf_token %}

      {% for question in questions %}
      <div class="question-block">
        <label for="question_{{ question.id }}">
          {{ question.label }}
          {% if question.is_required %}<span class="required-star" aria-hidden="true">*</span>{% endif %}
        </label>

        {% if question.question_type == "textarea" %}
          <textarea
            id="question_{{ question.id }}"
            name="question_{{ question.id }}"
            {% if question.is_required %}data-required="true"{% endif %}
            aria-describedby="error_{{ question.id }}"
          >{{ submitted_data|default:'' }}</textarea>
        {% else %}
          <input
            type="{{ question.question_type }}"
            id="question_{{ question.id }}"
            name="question_{{ question.id }}"
            value="{{ submitted_data|default:'' }}"
            {% if question.is_required %}data-required="true"{% endif %}
            aria-describedby="error_{{ question.id }}"
          />
        {% endif %}

        <span
          class="error-message{% if errors and question.id|stringformat:'s' in errors|stringformat:'s' %} visible{% endif %}"
          id="error_{{ question.id }}"
          role="alert"
          aria-live="polite"
        >
          {% if errors %}{{ errors|default_if_none:'' }}{% endif %}Mandatory field
        </span>
      </div>
      {% endfor %}

      <button type="submit" class="submit-btn">Submit</button>
    </form>
  </div>

  <script src="{% static 'core/js/validation.js' %}"></script>
  <script>
    document.addEventListener("DOMContentLoaded", initRequiredFieldValidation);
  </script>
</body>
</html>
